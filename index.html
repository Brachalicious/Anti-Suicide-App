<body>
    <div id="liveMirrorModal" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.92); flex-direction:column; align-items:center; justify-content:center; overflow-y:auto; padding:30px 20px;">
        <!-- Close button -->

            <video id="liveMirrorVideo" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block;"></video>
            <!-- Fallback if camera denied -->
            <div id="mirrorCameraError" style="display:none; position:absolute; inset:0; background:linear-gradient(135deg,#1a0a2e,#2d1b4e); flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;">

            </div>
            <!-- Shimmer ring overlay -->
            <div style="position:absolute; inset:0; border-radius:50%; pointer-events:none; box-shadow:inset 0 0 40px rgba(212,175,55,0.25);"></div>
            <!-- Gold glitter spoken words — floats above user's head inside the circle -->
            <div id="liveMirrorGlitterLine"></div>
        </div>

        <!-- Controls row: flip camera + record session + say it -->
        <div style="display:flex; gap:14px; margin-top:16px; align-items:center; justify-content:center; flex-wrap:wrap;">
            <button onclick="flipLiveMirrorCamera()" style="background:rgba(212,175,55,0.15); border:2px solid #d4af37; color:#d4af37; border-radius:30px; padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer;">🔄 Flip Camera</button>
            <button onclick="startLiveMirrorSpeech()" id="liveMirrorMicBtn" style="background:rgba(212,175,55,0.15); border:2px solid #d4af37; color:#d4af37; border-radius:30px; padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s;">🎤 Say It</button>
            <button onclick="recordMirrorSession()" id="mirrorRecordBtn" style="background:rgba(212,175,55,0.15); border:2px solid #d4af37; color:#d4af37; border-radius:30px; padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer;">✅ Mark Complete</button>
        </div>
        <p id="liveMirrorSpeechStatus" style="color:rgba(212,175,55,0.8); font-size:12px; text-align:center; margin-top:6px; min-height:16px;"></p>        <!-- Affirmation text below -->
        <div style="margin-top:14px; text-align:center; padding:0 24px; max-width:340px;">
            <p style="color:#fce7f3; font-size:13px; opacity:0.75; margin-bottom:6px; letter-spacing:0.5px;">✨ Look at yourself and say:</p>
            <p id="mirrorModalAffText" style="color:#d4af37; font-size:19px; font-weight:800; line-height:1.5; text-shadow:0 0 20px rgba(212,175,55,0.6);"></p>
        </div>

        </div>
    </div>

    <!-- Sign-in/Sign-out buttons (example placement) -->
    <div style="text-align: center; margin-top: 20px;">
        <button id="google-signin-btn" style="padding: 10px 20px; font-size: 16px; background-color: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer;">Sign in with Google</button>
        <button id="google-signout-btn" style="padding: 10px 20px; font-size: 16px; background-color: #DB4437; color: white; border: none; border-radius: 5px; cursor: pointer; display: none;">Sign Out</button>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>

    <script>
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyBbVt6AmWRi61VHZVF12ernzt8nJR0uaDM",
            authDomain: "antisuicideapp.firebaseapp.com",
            databaseURL: "https://antisuicideapp-default-rtdb.firebaseio.com",
            projectId: "antisuicideapp",
            storageBucket: "antisuicideapp.firebasestorage.app",
            messagingSenderId: "149935134747",
            appId: "1:149935134747:web:8e128c56c0b4005e7d00be",
            measurementId: "G-GYX63Q43EJ"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore(); // Initialize Firestore

        // Google Sign-In function
        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                // Try signing in with a popup
                await auth.signInWithPopup(provider);
                console.log("Signed in successfully with Google (popup)");
                // Redirect or update UI after successful sign-in
                window.location.href = "/dashboard.html"; // Example redirect
            } catch (error) {
                if (error.code === 'auth/popup-blocked' || error.code === 'auth/cancelled-popup-request') {
                    console.warn("Popup blocked or cancelled, trying redirect sign-in...");
                    // Fallback to redirect sign-in if popup is blocked or cancelled
                    await auth.signInWithRedirect(provider);
                } else {
                    console.error("Error during Google sign-in:", error);
                    alert("Error signing in with Google: " + error.message);
                }
            }
        }

        // Handle redirect result (if signInWithRedirect was used)
        auth.getRedirectResult().then((result) => {
            if (result.credential) {
                // This gives you a Google Access Token. You can use it to access the Google API.
                const token = result.credential.accessToken;
                console.log("Signed in successfully with Google (redirect)");
                // The signed-in user info.
                const user = result.user;
                // Redirect or update UI after successful sign-in
                window.location.href = "/dashboard.html"; // Example redirect
            }
        }).catch((error) => {
            console.error("Error during Google redirect sign-in:", error);
            alert("Error signing in with Google: " + error.message);
        });

        // Listen for authentication state changes
        auth.onAuthStateChanged(user => {
            const signInButton = document.querySelector('#google-signin-btn');
            const signOutButton = document.querySelector('#google-signout-btn');
            if (user) {
                console.log("User is signed in:", user.displayName);
                if (signInButton) signInButton.style.display = 'none';
                if (signOutButton) signOutButton.style.display = 'block';
                // You might want to update UI elements here, e.g., show user's name
            } else {
                console.log("User is signed out.");
                if (signInButton) signInButton.style.display = 'block';
                if (signOutButton) signOutButton.style.display = 'none';
            }
        });

        // Sign-out function
        async function signOutUser() {
            try {
                await auth.signOut();
                console.log("User signed out.");
                window.location.href = "/"; // Redirect to home or sign-in page
            } catch (error) {
                console.error("Error signing out:", error);
                alert("Error signing out: " + error.message);
            }
        }

        // Attach event listeners to buttons (assuming these buttons exist in your HTML)
        document.addEventListener('DOMContentLoaded', () => {
            const signInButton = document.querySelector('#google-signin-btn');
            if (signInButton) signInButton.addEventListener('click', signInWithGoogle);
            const signOutButton = document.querySelector('#google-signout-btn');
            if (signOutButton) signOutButton.addEventListener('click', signOutUser);
        });
    </script>
