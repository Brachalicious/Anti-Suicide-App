<body>
    <div id="liveMirrorModal" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.92); flex-direction:column; align-items:center; justify-content:center; overflow-y:auto; padding:30px 20px;">
        <!-- Close button -->
        <button onclick="closeLiveMirror()" style="position:absolute; top:18px; right:20px; background:rgba(212,175,55,0.2); border:2px solid #d4af37; color:#d4af37; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer; z-index:100001; display:flex; align-items:center; justify-content:center;">✕</button>

        <!-- Round camera viewport -->
        <div style="position:relative; width:min(80vw, 80vh); height:min(80vw, 80vh); border-radius:50%; overflow:hidden; border:5px solid #d4af37; box-shadow:0 0 60px rgba(212,175,55,0.7), 0 0 120px rgba(212,175,55,0.3);">
            <video id="liveMirrorVideo" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block;"></video>
            <!-- Fallback if camera denied -->
            <div id="mirrorCameraError" style="display:none; position:absolute; inset:0; background:linear-gradient(135deg,#1a0a2e,#2d1b4e); flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;">
                <div style="font-size:48px; margin-bottom:12px;">🪞</div>
                <p style="color:#d4af37; font-size:16px; font-weight:700;">Camera access needed</p>
                <p style="color:#fce7f3; font-size:13px; margin-top:8px;">Allow camera permission in your browser to see your reflection</p>
            </div>
            <!-- Shimmer ring overlay -->
            <div style="position:absolute; inset:0; border-radius:50%; pointer-events:none; box-shadow:inset 0 0 40px rgba(212,175,55,0.25);"></div>
            <!-- Gold glitter spoken words — floats above user's head inside the circle -->
            <div id="liveMirrorGlitterLine"></div>
        </div>

        <!-- Controls row: flip camera + record session + say it -->
        <div style="display:flex; gap:14px; margin-top:16px; align-items:center; justify-content:center; flex-wrap:wrap;">
            <button onclick="flipLiveMirrorCamera()" style="background:rgba(212,175,55,0.15); border:2px solid #d4af37; color:#d4af37; border-radius:30px; padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer;">🔄 Flip Camera</button>
            <button onclick="startLiveMirrorSpeech()" id="liveMirrorMicBtn" style="background:rgba(212,175,55,0.15); border:2px solid #d4af37; color:#d4af37; border-radius:30px; padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s;">🎤 Say It</button>
            <button onclick="recordMirrorSession()" id="mirrorRecordBtn" style="background:rgba(212,175,55,0.15); border:2px solid #d4af37; color:#d4af37; border-radius:30px; padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer;">✅ Mark Complete</button>
        </div>
        <p id="liveMirrorSpeechStatus" style="color:rgba(212,175,55,0.8); font-size:12px; text-align:center; margin-top:6px; min-height:16px;"></p>        <!-- Affirmation text below -->
        <div style="margin-top:14px; text-align:center; padding:0 24px; max-width:340px;">
            <p style="color:#fce7f3; font-size:13px; opacity:0.75; margin-bottom:6px; letter-spacing:0.5px;">✨ Look at yourself and say:</p>
            <p id="mirrorModalAffText" style="color:#d4af37; font-size:19px; font-weight:800; line-height:1.5; text-shadow:0 0 20px rgba(212,175,55,0.6);"></p>
        </div>

        <!-- Session tracker display -->
        <div style="margin-top:12px; text-align:center;">
            <p id="mirrorSessionDisplay" style="color:rgba(212,175,55,0.7); font-size:12px;"></p>
        </div>
    </div>

    <!-- Add this right inside your <body> tag at the top -->
    <div class="account-bar" style="display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin: 20px auto; max-width: 1200px; padding: 0 20px;">
        <span id="user-status-text" style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Checking connection...</span>
        <button id="auth-btn" class="btn" style="margin-top: 0; padding: 8px 16px; background: #ff1493; display: none;">Sign In</button>
    </div>

    <!-- Replace your existing <script> section at the bottom with this module script -->
    <script type="module">
        // Import Firebase v10 SDK modules dynamically
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // REPLACE THIS WITH YOUR ACTUAL FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const authBtn = document.getElementById('auth-btn');
        const statusText = document.getElementById('user-status-text');

        // Monitor Authentication State change
        onAuthStateChanged(auth, (user) => {
            authBtn.style.display = "inline-block"; // Show button once state loads
            if (user) {
                statusText.textContent = `Logged in as: ${user.displayName || user.email}`;
                authBtn.textContent = "Sign Out";
                authBtn.style.background = "#d90429"; 
            } else {
                statusText.textContent = "Sign in to save your personal entries securely across devices.";
                authBtn.textContent = "Sign In with Google";
                authBtn.style.background = "#ff1493";
            }
        });

        // Handle button interaction
        authBtn.addEventListener('click', async () => {
            if (auth.currentUser) {
                try {
                    await signOut(auth);
                    alert("Signed out successfully.");
                } catch (error) {
                    console.error("Logout Error:", error);
                }
            } else {
                try {
                    await signInWithPopup(auth, provider);
                    alert("Signed in successfully!");
                } catch (error) {
                    console.error("Login Error:", error);
                    alert("Failed to sign in: " + error.message);
                }
            }
        });

        // Your existing loadHotlines framework logic below...
        async function loadHotlines() {
            try {
                const response = await fetch('/api/crisis-hotlines');
                if (!response.ok) throw new Error('Network issue');
                const data = await response.json();
                if(data && data.length > 0) {
                    const container = document.getElementById('hotline-container');
                    container.innerHTML = '';
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'hotline-card';
                        card.innerHTML = `
                            <h3>${item.name}</h3>
                            <p class="hotline-number">${item.phoneNumber}</p>
                            <p>${item.description}</p>
                            <a href="${item.website}" target="_blank" style="color: #ff1493; text-decoration: none; font-size: 0.9rem;">Visit Website →</a>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                console.log("Using local static data display as fallback.", error);
            }
        }
        window.addEventListener('DOMContentLoaded', loadHotlines);
    </script>
</body>
</html>
