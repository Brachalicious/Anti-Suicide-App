[build]
  publish = "."

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Server-side Gemini proxy lives in netlify/functions/chat.js so the
# chatbots work for users who haven't pasted their own API key.
# Set GEMINI_API_KEY in: Site settings → Environment variables.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/my logo updated.svg"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Old browsers (and lots of bots) ask for /favicon.ico regardless of <link> tags.
# Quietly serve the SVG so the console stops 404-ing.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

# Clean alias for the chat proxy function so the browser code can just POST
# to /api/chat (no Netlify-specific path baked in).
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
